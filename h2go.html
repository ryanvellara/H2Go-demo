<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H2Go — Clean Drinking Water</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0f1a;
    --surface: #111827;
    --surface2: #1a2535;
    --border: #1f3050;
    --accent: #00c6ff;
    --accent2: #0072ff;
    --good: #22d3a5;
    --medium: #f59e0b;
    --poor: #f87171;
    --text: #e2eaf7;
    --muted: #6b84a3;
    --font-display: 'DM Serif Display', serif;
    --font-body: 'Outfit', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
 
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
 
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: var(--font-display);
    font-size: 1.5rem;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent), #a8edfc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo-sub {
    font-size: 0.68rem;
    color: var(--muted);
    font-family: var(--font-mono);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .header-stats { display: flex; gap: 24px; }
  .stat { text-align: center; }
  .stat-num {
    font-family: var(--font-mono);
    font-size: 1.2rem;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .add-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .add-btn:hover { opacity: 0.85; transform: translateY(-1px); }
 
  .main { display: flex; flex: 1; overflow: hidden; }
 
  .sidebar {
    width: 360px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 18px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-size: 0.7rem;
    font-family: var(--font-mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .search-bar {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    gap: 8px;
  }
  .search-bar input {
    background: none; border: none; outline: none;
    color: var(--text); font-family: var(--font-body); font-size: 0.85rem; flex: 1;
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 14px; }
 
  .filter-row {
    display: flex; gap: 6px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.72rem;
    font-family: var(--font-mono);
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(0,198,255,0.06); }
  .filter-btn.good.active  { color: var(--good);   border-color: var(--good);   background: rgba(34,211,165,0.06); }
  .filter-btn.medium.active{ color: var(--medium); border-color: var(--medium); background: rgba(245,158,11,0.06); }
  .filter-btn.poor.active  { color: var(--poor);   border-color: var(--poor);   background: rgba(248,113,113,0.06); }
 
  .centres-list { flex: 1; overflow-y: auto; padding: 12px; }
  .centres-list::-webkit-scrollbar { width: 4px; }
  .centres-list::-webkit-scrollbar-track { background: transparent; }
  .centres-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
 
  .centre-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .centre-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 10px 0 0 10px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .centre-card:hover, .centre-card.active { border-color: var(--accent); transform: translateX(2px); }
  .centre-card:hover::before, .centre-card.active::before { opacity: 1; }
  .centre-card.good-card::before   { background: var(--good); }
  .centre-card.medium-card::before { background: var(--medium); }
  .centre-card.poor-card::before   { background: var(--poor); }
  .centre-card.good-card:hover,   .centre-card.good-card.active   { border-color: var(--good); }
  .centre-card.medium-card:hover, .centre-card.medium-card.active { border-color: var(--medium); }
  .centre-card.poor-card:hover,   .centre-card.poor-card.active   { border-color: var(--poor); }
 
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .centre-name { font-weight: 600; font-size: 0.9rem; line-height: 1.3; flex: 1; padding-right: 8px; }
  .quality-badge {
    font-family: var(--font-mono); font-size: 0.65rem; font-weight: 500;
    padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
  }
  .badge-good   { background: rgba(34,211,165,0.15); color: var(--good);   border: 1px solid rgba(34,211,165,0.3); }
  .badge-medium { background: rgba(245,158,11,0.15);  color: var(--medium); border: 1px solid rgba(245,158,11,0.3); }
  .badge-poor   { background: rgba(248,113,113,0.15); color: var(--poor);   border: 1px solid rgba(248,113,113,0.3); }
 
  .centre-address { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; }
 
  /* ── 1-10 RATING BAR ── */
  .rating-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .rating-score {
    font-family: var(--font-mono);
    font-size: 1rem;
    font-weight: 500;
    min-width: 28px;
  }
  .rating-bar-track {
    flex: 1; height: 5px; border-radius: 3px;
    background: var(--border);
    overflow: hidden;
  }
  .rating-bar-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.4s ease;
  }
  .rating-label {
    font-size: 0.65rem;
    font-family: var(--font-mono);
    color: var(--muted);
    min-width: 28px;
    text-align: right;
  }
 
  .centre-review {
    font-size: 0.75rem; color: var(--muted); line-height: 1.5; font-style: italic;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-delete {
    position: absolute; top: 10px; right: 10px;
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 14px; opacity: 0;
    transition: opacity 0.2s, color 0.2s; z-index: 2;
  }
  .centre-card:hover .card-delete { opacity: 1; }
  .card-delete:hover { color: var(--poor); }
 
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon  { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text  { font-size: 0.85rem; line-height: 1.6; }
 
  #map { flex: 1; background: var(--bg); }
 
  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 460px;
    max-width: 92vw;
    transform: scale(0.95) translateY(12px);
    transition: transform 0.25s;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-title { font-family: var(--font-display); font-size: 1.6rem; margin-bottom: 6px; }
  .modal-sub   { font-size: 0.8rem; color: var(--muted); margin-bottom: 24px; font-family: var(--font-mono); }
 
  .field { margin-bottom: 18px; }
  .field label {
    display: block; font-size: 0.72rem; font-family: var(--font-mono);
    color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px;
  }
  .field input, .field textarea, .field select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--font-body);
    font-size: 0.88rem; padding: 10px 14px; outline: none; transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 80px; }
  .field select option { background: var(--surface2); }
 
  /* ── 1-10 NUMERIC RATING INPUT ── */
  .rating-input-wrap {
    display: flex; align-items: center; gap: 12px;
  }
  .rating-btns {
    display: flex; gap: 4px; flex-wrap: wrap;
  }
  .rating-num-btn {
    width: 32px; height: 32px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    display: grid; place-items: center;
  }
  .rating-num-btn:hover { border-color: var(--accent); color: var(--accent); }
  .rating-num-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .rating-num-btn.active.score-high   { background: var(--good);   border-color: var(--good); }
  .rating-num-btn.active.score-medium { background: var(--medium); border-color: var(--medium); }
  .rating-num-btn.active.score-poor   { background: var(--poor);   border-color: var(--poor); }
 
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn-primary {
    flex: 1; background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff; border: none; padding: 12px; border-radius: 8px;
    font-family: var(--font-body); font-weight: 600; font-size: 0.9rem;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); padding: 12px 20px; border-radius: 8px;
    font-family: var(--font-body); font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }
</style>
</head>
<body>
 
<header>
  <div class="logo">
    <div class="logo-icon">💧</div>
    <div>
      <div class="logo-text">H2Go</div>
      <div class="logo-sub">Water Purification Network</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="total-count">0</div>
      <div class="stat-label">Centres</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="good-count" style="color:var(--good)">0</div>
      <div class="stat-label">Good Quality</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="avg-rating">—</div>
      <div class="stat-label">Avg Rating</div>
    </div>
  </div>
  <button class="add-btn" onclick="openModal()">＋ Add Centre</button>
</header>
 
<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Registered Centres</div>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search by name or address…" oninput="renderList()">
      </div>
    </div>
    <div class="filter-row">
      <button class="filter-btn active"  data-filter="all"    onclick="setFilter('all',this)">All</button>
      <button class="filter-btn good"    data-filter="good"   onclick="setFilter('good',this)">Good</button>
      <button class="filter-btn medium"  data-filter="medium" onclick="setFilter('medium',this)">Moderate</button>
      <button class="filter-btn poor"    data-filter="poor"   onclick="setFilter('poor',this)">Poor</button>
    </div>
    <div class="centres-list" id="centres-list"></div>
  </div>
  <div id="map"></div>
</div>
 
<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">Add Centre</div>
    <div class="modal-sub">// register a water purification facility</div>
 
    <div class="field">
      <label>Centre Name *</label>
      <input type="text" id="f-name" placeholder="e.g. Cauvery Water Treatment Plant">
    </div>
    <div class="field">
      <label>Address *</label>
      <input type="text" id="f-address" placeholder="Full address of the centre">
    </div>
    <div class="field">
      <label>Water Quality</label>
      <select id="f-quality">
        <option value="good">Good — Meets all standards</option>
        <option value="medium">Moderate — Minor concerns</option>
        <option value="poor">Poor — Needs improvement</option>
      </select>
    </div>
    <div class="field">
      <label>Rating (1–10)</label>
      <div class="rating-btns" id="rating-btns">
        <!-- generated by JS -->
      </div>
    </div>
    <div class="field">
      <label>Review / Notes</label>
      <textarea id="f-review" placeholder="Describe water quality, facilities, observations…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="addCentre()">Add to Map</button>
    </div>
  </div>
</div>
 
<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let centres = [];
let selectedRating = 0;
let activeFilter = 'all';
let selectedId = null;
let markers = {};
 
// ─── BUILD RATING BUTTONS ────────────────────────────────────────────────────
(function buildRatingBtns() {
  const wrap = document.getElementById('rating-btns');
  for (let i = 1; i <= 10; i++) {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'rating-num-btn';
    b.textContent = i;
    b.dataset.val = i;
    b.onclick = () => setRating(i);
    wrap.appendChild(b);
  }
})();
 
function setRating(n) {
  selectedRating = n;
  document.querySelectorAll('.rating-num-btn').forEach(b => {
    const v = +b.dataset.val;
    b.classList.remove('active','score-high','score-medium','score-poor');
    if (v === n) {
      b.classList.add('active');
      if (n >= 8) b.classList.add('score-high');
      else if (n >= 5) b.classList.add('score-medium');
      else b.classList.add('score-poor');
    }
  });
}
 
// ─── MAP SETUP ───────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([20.5937, 78.9629], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);
 
function markerColor(q) {
  return q === 'good' ? '#22d3a5' : q === 'medium' ? '#f59e0b' : '#f87171';
}
 
function ratingColor(r) {
  return r >= 8 ? '#22d3a5' : r >= 5 ? '#f59e0b' : '#f87171';
}
 
function createMarkerIcon(quality) {
  const c = markerColor(quality);
  return L.divIcon({
    className: '',
    html: `<div style="width:18px;height:18px;border-radius:50%;background:${c};border:3px solid ${c}44;box-shadow:0 0 8px ${c}88;"></div>`,
    iconSize: [18,18], iconAnchor: [9,9]
  });
}
 
// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-name').focus();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  clearForm();
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
function clearForm() {
  ['f-name','f-address','f-review'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-quality').value = 'good';
  setRating(0);
  selectedRating = 0;
  document.querySelectorAll('.rating-num-btn').forEach(b => b.classList.remove('active','score-high','score-medium','score-poor'));
}
 
// ─── ADD CENTRE (geocode address silently) ───────────────────────────────────
async function addCentre() {
  const name    = document.getElementById('f-name').value.trim();
  const address = document.getElementById('f-address').value.trim();
  const quality = document.getElementById('f-quality').value;
  const review  = document.getElementById('f-review').value.trim();
 
  if (!name)    { alert('Please enter a name.'); return; }
  if (!address) { alert('Please enter an address.'); return; }
 
  // geocode silently
  let lat = null, lng = null;
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const data = await res.json();
    if (data.length > 0) { lat = parseFloat(data[0].lat); lng = parseFloat(data[0].lon); }
  } catch(e) {}
 
  if (lat === null) {
    // fallback: random scatter near India centroid so it still shows on map
    lat = 20.5937 + (Math.random()-0.5)*10;
    lng = 78.9629 + (Math.random()-0.5)*10;
  }
 
  const id = Date.now().toString();
  const centre = { id, name, address, lat, lng, quality, rating: selectedRating, review };
  centres.push(centre);
  addMarker(centre);
  renderList();
  updateStats();
  closeModal();
  flyTo(centre);
}
 
function addMarker(c) {
  const m = L.marker([c.lat, c.lng], { icon: createMarkerIcon(c.quality) }).addTo(map);
  const qLabel = c.quality === 'good' ? 'Good' : c.quality === 'medium' ? 'Moderate' : 'Poor';
  const qColor = markerColor(c.quality);
  const rc = c.rating ? ratingColor(c.rating) : '#6b84a3';
  m.bindPopup(`
    <div style="font-family:'Outfit',sans-serif;min-width:210px;color:#e2eaf7;">
      <div style="font-weight:700;font-size:1rem;margin-bottom:4px">${c.name}</div>
      <div style="font-size:0.75rem;color:#6b84a3;margin-bottom:8px">📍 ${c.address}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <div style="display:inline-block;background:${qColor}22;color:${qColor};border:1px solid ${qColor}55;font-size:0.7rem;padding:2px 8px;border-radius:12px;font-family:'DM Mono',monospace;">${qLabel}</div>
        ${c.rating ? `<div style="font-family:'DM Mono',monospace;font-size:0.85rem;color:${rc};font-weight:600;">${c.rating}<span style="color:#6b84a3;font-size:0.7rem">/10</span></div>` : ''}
      </div>
      ${c.review ? `<div style="font-size:0.75rem;color:#a0b3c9;font-style:italic;line-height:1.5">"${c.review}"</div>` : ''}
    </div>
  `, { className: 'dark-popup', maxWidth: 260 });
  m.on('click', () => selectCentre(c.id));
  markers[c.id] = m;
}
 
function flyTo(c) {
  map.flyTo([c.lat, c.lng], 13, { duration: 1.2 });
  setTimeout(() => markers[c.id]?.openPopup(), 1300);
}
 
function deleteCentre(id, e) {
  e.stopPropagation();
  if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
  centres = centres.filter(c => c.id !== id);
  if (selectedId === id) selectedId = null;
  renderList(); updateStats();
}
 
function selectCentre(id) {
  selectedId = id;
  renderList();
  const c = centres.find(x => x.id === id);
  if (c) flyTo(c);
}
 
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}
 
// ─── RENDER LIST ─────────────────────────────────────────────────────────────
function renderList() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('centres-list');
  let filtered = centres.filter(c => {
    const mf = activeFilter === 'all' || c.quality === activeFilter;
    const ms = !q || c.name.toLowerCase().includes(q) || c.address.toLowerCase().includes(q);
    return mf && ms;
  });
 
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">💧</div>
      <div class="empty-text">${centres.length === 0
        ? 'No centres added yet.<br>Click <strong>Add Centre</strong> to get started.'
        : 'No centres match your filter.'}</div>
    </div>`;
    return;
  }
 
  list.innerHTML = filtered.map(c => {
    const qLabel = c.quality === 'good' ? 'Good' : c.quality === 'medium' ? 'Moderate' : 'Poor';
    const rc = ratingColor(c.rating);
    const barPct = c.rating ? (c.rating / 10 * 100) : 0;
    const ratingHtml = c.rating ? `
      <div class="rating-row">
        <span class="rating-score" style="color:${rc}">${c.rating}</span>
        <div class="rating-bar-track">
          <div class="rating-bar-fill" style="width:${barPct}%;background:${rc}"></div>
        </div>
        <span class="rating-label">/10</span>
      </div>` : '';
    return `<div class="centre-card ${c.quality}-card ${selectedId === c.id ? 'active' : ''}" onclick="selectCentre('${c.id}')">
      <button class="card-delete" onclick="deleteCentre('${c.id}', event)" title="Remove">✕</button>
      <div class="card-top">
        <div class="centre-name">${c.name}</div>
        <div class="quality-badge badge-${c.quality}">${qLabel}</div>
      </div>
      <div class="centre-address">📍 ${c.address}</div>
      ${ratingHtml}
      ${c.review ? `<div class="centre-review">"${c.review}"</div>` : ''}
    </div>`;
  }).join('');
}
 
// ─── STATS ───────────────────────────────────────────────────────────────────

  document.getElementById('total-count').textContent = centres.length;
  document.getElementById('good-count').textContent = centres.filter(c => c.quality === 'good').length;

  document.getElementById('avg-rating').textContent = rated.length

    : '—';
}
